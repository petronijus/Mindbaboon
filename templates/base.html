<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title if title else "Mindbaboon" }}</title>

  <!-- Adobe Fonts (replace xxxxxx with your Kit ID) -->
  <link rel="stylesheet" href="https://use.typekit.net/enw8aoe.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <h1><a href="{{ url_for('index') }}">Mindbaboon</a></h1>
    <nav>
      <a href="{{ url_for('add_goal') }}">Add New Goal</a> |
      <a href="{{ url_for('settings') }}">Settings</a>
    </nav>
    
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2025 Mindbaboon | Version {{ version }}</p>
  </footer>
  

</body>
</html>
