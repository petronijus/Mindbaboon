<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Uu Aa, NEW banana! {{ goal_name }}</title>
   <!-- Adobe Fonts (replace xxxxxx with your Kit ID) -->
   <link rel="stylesheet" href="https://use.typekit.net/enw8aoe.css">
  <style>
    body {
      font-family: "crete", 'Book Antiqua', serif;
      margin: 0;
      padding: 20px;
      color: #333;
      font-weight: normal;
    }
    /* .email-container {
      background-color: #fff;
    } */
    h1, h2 {
      margin: 0px;
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 30px;
    }
    h1 {
      color: #000;
      font-size: 3rem;
    }
    p {
      font-size: 1.3rem;
      line-height: 1.3;
      color: #858585;
      margin: 0px;
    }
    strong {
      font-weight: bold; 
    }
    .quote {
      font-size: 2rem;
      font-style: italic;
      color: #e6e6e6;
      margin-bottom: 20px;
    }
    .signature {
      margin-top: 20px;
      font-style: italic;
      color: black;
      font-weight: normal;
    }
    .meta {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #9a9a9a;
    }
    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #bbb;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <p class="quote">{{ quote }}</p>
    <p><strong>Your new project banana!:</strong></p>
    <h2>{{ goal_name }}</h2>
    <p><strong>Next Steps:</strong></p>
    <h1>{{ next_steps }}</h1>
    <p>Me watching!</p>
    <p class="signature"><i>Mindbaboon!</i></p>
    {% if next_run %}
    <p class="meta">First check-in: <strong>{{ next_run }}</strong></p>
    {% endif %}
    <p class="footer">Mindbaboon v{{ version }}</p>
  </div>
</body>
</html>
