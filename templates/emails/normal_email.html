<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mindbaboon 1:1 time! {{ goal_name }}</title>
   <!-- Adobe Fonts (replace xxxxxx with your Kit ID) -->
   <link rel="stylesheet" href="https://use.typekit.net/enw8aoe.css">
  <style>
    body {
      font-family: "crete", 'Book Antiqua', serif;
      margin: 0;
      padding: 20px;
      color: #333;
      font-weight: normal;
    }
    /* .email-container {
      background-color: #fff;
    } */
    h1, h2 {
      margin: 0px;
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 30px;
    }
    h1 {
      color: #000;
      font-size: 3rem;
    }
    p {
      font-size: 1.3rem;
      line-height: 1.3;
      color: #858585;
      margin: 0px;
    }
    strong {
      font-weight: bold; 
    }
    .link_yes {
      color: rgb(118, 175, 12);
    }
    .link_no {
      color: rgb(255, 0, 0);
    }
    .quote {
      font-size: 2rem;
      font-style: italic;
      color: #e6e6e6;
      margin-bottom: 20px;
    }
    .signature {
      margin-top: 20px;
      font-style: italic;
      color: black;
      font-weight: normal; 
    }
  </style>
</head>
<body>
  <div class="email-container">
    <p class="quote">{{ quote }}</p>
    <p><strong>Did you rocked</strong></p>
    <h2>{{ goal_name }}</h2>
    <p><strong>Have you completed</strong></p>
    <h1>{{ next_steps }}</h1>
    <h2>
      <a class="link_yes" href="{{ iteration_url_yes }}">YES!</a> | 
      <a class="link_no" href="{{ iteration_url_no }}">Oh nooooo</a>
    </h2>
    <p>Me watching!</p>
    <p class="signature"><i>Mindbaboon!</i></p>
  </div>
</body>
</html>
