{% extends "base.html" %}
{% block content %}
<div class="add-goal-page">
  <h1>{{ goal.goal_name }}</h1>
  <p>{{ goal.goal_description }}</p>
  <p>{{ goal.next_steps }}</p>

  <form method="POST" class="form-group-big">
    <label>Step completed?</label><br>
    <input type="radio" name="completed" value="yes" {% if request.args.get('completed') == 'yes' %}checked{% endif %} onclick="updateMessage('yes')"> Yes<br>
    <input type="radio" name="completed" value="no" {% if request.args.get('completed') == 'no' %}checked{% endif %} onclick="updateMessage('no')"> No<br>

    <h1 id="dynamicMessage">
      {% if request.args.get('completed') == 'yes' %}
        Banana!
      {% elif request.args.get('completed') == 'no' %}
        Baboon is angry
      {% endif %}
    </h1>

    <label id="lblWasDone">Write shortly what you did:</label><br>
    <textarea id="txtWasDone" name="was_done"></textarea><br>

    <label id="lblNextStep">Next Step:</label><br>
    <textarea id="txtNextStep" name="next_steps">{{ goal.next_steps }}</textarea><br>

    <label id="lblReward">Reward:</label><br>
    <input type="text" id="txtReward" name="reward" value="{{ goal.reward }}"><br>

    <label id="lblIteration">Iteration Frequency:</label><br>
    <select id="selIteration" name="iteration">
      <option value="week" {% if goal.iteration == 'week' %}selected{% endif %}>Week</option>
      <option value="2 weeks" {% if goal.iteration == '2 weeks' %}selected{% endif %}>2 Weeks</option>
      <option value="month" {% if goal.iteration == 'month' %}selected{% endif %}>Month</option>
    </select><br>

    <button type="submit" id="btnSave" class="add-goal-button">Save</button>
  </form>
</div>

<script>
  function updateMessage(value) {
    const dynamicMessage = document.getElementById('dynamicMessage');
    const lblWasDone = document.getElementById('lblWasDone');
    const txtWasDone = document.getElementById('txtWasDone');
    const lblNextStep = document.getElementById('lblNextStep');
    const txtNextStep = document.getElementById('txtNextStep');
    const lblReward = document.getElementById('lblReward');
    const txtReward = document.getElementById('txtReward');
    const lblIteration = document.getElementById('lblIteration');
    const selIteration = document.getElementById('selIteration');
    const btnSave = document.getElementById('btnSave');

    if (value === 'yes') {
      dynamicMessage.textContent = 'Banana!';
      lblWasDone.textContent = 'Write shortly what you did:';
      txtWasDone.value = '';
      lblNextStep.textContent = 'Next Step:';
      txtNextStep.value = '';
      lblReward.textContent = 'Reward:';
      txtReward.value = '';
      lblIteration.textContent = 'Iteration Frequency:';

    } else if (value === 'no') {
      dynamicMessage.textContent = 'Baboon is angry';
      lblWasDone.textContent = 'Write shortly what you did:';
      txtWasDone.value = '';
      lblNextStep.textContent = 'Next Step:';
      txtNextStep.value = '{{ goal.next_steps }}';
      lblReward.textContent = 'Reward:';
      txtReward.value = '{{ goal.reward }}';
      lblIteration.textContent = 'Iteration Frequency:';
    }
  }
</script>
{% endblock %}
