{% extends "base.html" %}
{% block content %}
<div class="add-goal-page">
  <div class="goal-form-container">
    <form method="POST" action="{{ url_for('edit_goal', goal_id=goal['id']) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Large heading-style input -->
        <input
          type="text"
          id="goal_name"
          name="goal_name"
          class="input-big"
          placeholder="Tell me your goal."
          data-placeholder="Tell me your goal."
          value="{{ goal['goal_name'] }}"
          required
        >
        <hr class="divider">

      <!-- Single-sentence description -->
      <div class="form-group">
        <textarea
          type="text"
          id="goal_description"
          name="goal_description"
          maxlength="200"
          class="input-medium"
          rows="1"
          required
        >{{ goal['goal_description'] }}</textarea>
        <p class="text-light small">200 chars</p>

      </div>

      <!-- Time Span Options -->
      <div class="form-inline-group">
        <span class="form-label">time span</span>
        <label>
          <input
            type="radio"
            name="time_span"
            value="weeks"
            {% if goal['time_span'] == 'weeks' %}checked{% endif %}
          > weeks
        </label>
        <label>
          <input
            type="radio"
            name="time_span"
            value="months"
            {% if goal['time_span'] == 'months' %}checked{% endif %}
          > months
        </label>
        <label>
          <input
            type="radio"
            name="time_span"
            value="specific_date"
            {% if goal['time_span'] == 'specific_date' %}checked{% endif %}
          > specific date
        </label>
      </div>

      <!-- Specific Date Input -->
      <div id="specific-date-container" class="form-group {% if goal['time_span'] == 'specific_date' %}visible{% else %}hidden{% endif %}">
        <label for="specific_date" class="label-floating">Choose a specific date:</label>
        <input
          type="date"
          id="specific_date"
          name="specific_date"
          value="{{ goal['specific_date'] }}"
        >
      </div>

      <!-- Iteration Options -->
      <div class="form-inline-group">
        <span class="form-label">iteration</span>
        <label>
          <input
            type="radio"
            name="iteration"
            value="week"
            {% if goal['iteration'] == 'week' %}checked{% endif %}
          > week
        </label>
        <label>
          <input
            type="radio"
            name="iteration"
            value="2 weeks"
            {% if goal['iteration'] == '2 weeks' %}checked{% endif %}
          > 2 weeks
        </label>
        <label>
          <input
            type="radio"
            name="iteration"
            value="month"
            {% if goal['iteration'] == 'month' %}checked{% endif %}
          > month
        </label>
      </div>

      <!-- Next Step -->
      <div class="form-group">
        <textarea
          id="next_steps"
          name="next_steps"
          maxlength="64"
          class="input-medium"
          rows="1"
        >{{ goal['next_steps'] }}</textarea>
        <p class="text-light small">64 chars</p>
      </div>

      <!-- Reward -->
      <div class="form-group">
        <textarea
          type="text"
          id="reward"
          name="reward"
          maxlength="64"
          class="input-medium"
          rows="1"
        >{{ goal['reward'] }}</textarea>
        <p class="text-light small">64 chars</p>
      </div>


      <!-- Completed Checkbox (optional if you want to toggle completion here) -->
      <div class="form-group">
        <label>
          <input
            type="checkbox"
            name="completed"
            {% if goal['completed'] == 1 %}checked{% endif %}
          >
          Mark as completed
        </label>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="add-goal-button">save</button>
    </form>
  </div>


    <!-- Iteration History Section -->
    <div class="form-group">
      <h2>History</h2>
      <table id="iteration-history" data-goal-id="{{ goal.id }}">
        <thead>
          <tr>
            <th>date</th>
            <th>iteration</th>
            <th>what was done</th>
            <th>next steps</th>
            <th>reward</th>
          </tr>
        </thead>
        <tbody>
          <!-- History rows will be populated dynamically -->
        </tbody>
      </table>
    </div>
  </div>

{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', filename='page-form.js') }}"></script>
<script src="{{ url_for('static', filename='page-edit.js') }}"></script>
{% endblock %}
