{% extends "base.html" %}
{% block content %}
<div class="add-goal-page">
  <!-- Form container -->
  <div class="goal-form-container">
    <form method="POST" action="{{ url_for('add_goal') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Large heading-style input -->
          <input
            type="text"
            id="goal_name"
            name="goal_name"
            class="input-big"
            placeholder="Tell me your goal."
            onfocus="this.placeholder=''"
            onblur="this.placeholder='Tell me your goal.'"
            required
          >
        <hr class="divider">

      <!-- Single-sentence description -->
      <div class="form-group">
        <textarea 
          type="text" 
          id="goal_description" 
          name="goal_description" 
          maxlength="200" 
          class="input-medium"
          rows="1"
          placeholder="Explain in one sentence."
          onfocus="this.placeholder=''"
          onblur="this.placeholder='Explain in one sentence.'"
          required
        ></textarea>
        <p class="text-light small">200 chars</p>
        
      </div>

      <!-- Time Span Options -->
      <div class="form-inline-group">
        <span class="form-label">time span</span>
        <label>
          <input type="radio" name="time_span" value="weeks" checked> weeks
        </label>
        <label>
          <input type="radio" name="time_span" value="months"> months
        </label>
        <label>
          <input type="radio" name="time_span" value="specific_date"> date
        </label>
      </div>

      <!-- Specific Date Input -->
      <div class="form-group" id="specific-date-container" style="display: none;">
        <label for="specific_date" class="label-floating">Choose a specific date:</label>
        <input
          type="date"
          id="specific_date"
          name="specific_date"
        >
      </div>

      <script>
        // JavaScript to toggle specific date input visibility
        document.querySelectorAll('input[name="time_span"]').forEach(input => {
          input.addEventListener('change', function() {
            const specificDateContainer = document.getElementById('specific-date-container');
            specificDateContainer.style.display = this.value === 'specific_date' ? 'block' : 'none';
          });
        });
      </script>


      <!-- Iteration Options -->
      <div class="form-inline-group">
        <span class="form-label">iteration</span>
        <label>
          <input type="radio" name="iteration" value="week" checked> week
        </label>
        <label>
          <input type="radio" name="iteration" value="2 weeks"> 2 weeks
        </label>
        <label>
          <input type="radio" name="iteration" value="month"> month
        </label>
      </div>

      <!-- Next Step -->
      <div class="form-group">
        <textarea 
          id="next_steps" 
          name="next_steps" 
          maxlength="64" 
          class="input-medium"
          rows="1"
          placeholder="Next steps: What needs to be done till next iteration?"
          onfocus="this.placeholder=''"
          onblur="this.placeholder='Next steps: What needs to be done till next iteration?'"
        ></textarea>
        <p class="text-light small">64 chars</p>
      </div>

      <!-- Reward -->
      <div class="form-group">
        <textarea  
          type="text" 
          id="reward" 
          name="reward" 
          maxlength="64" 
          class="input-medium"
          rows="1"
          placeholder="How do I reward myself."
          onfocus="this.placeholder=''"
          onblur="this.placeholder='How do I reward myself.'"
        ></textarea>
        <p class="text-light small">64 chars</p>
      </div>

      <!-- Submit -->
      <button type="submit" class="add-goal-button">Save Goal</button>
    </form>
  </div>
</div>
{% endblock %}
