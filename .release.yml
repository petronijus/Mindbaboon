name: mindbaboon
tag_format: v{version}
version_files:
  - path: VERSION
changelog: CHANGELOG.md
artifacts:
  mode: local                 # image is built + pushed LOCALLY (not in CI)
  local_build: ./scripts/build-push.sh   # docker build + push to GHCR
  local_upload: []            # artifact is the GHCR image, not a release file
registry:
  images:
    - ghcr.io/petronijus/mindbaboon
preflight_extra: []
