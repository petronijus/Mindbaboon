services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mindbaboon_data:/app/data
    env_file:
      - .env
    environment:
      - FLASK_APP=mindbaboon.py
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - FLASK_RUN_HOST=0.0.0.0
      - TZ=Europe/Prague
    command: sh -c "python init_mindbaboon_db.py && python mindbaboon.py"

volumes:
  mindbaboon_data:
