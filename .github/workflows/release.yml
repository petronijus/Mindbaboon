name: release

# The image is built and pushed to GHCR LOCALLY (scripts/build-push.sh), not in
# CI. On a version tag this workflow only (a) validates the Docker build and
# (b) creates the GitHub release with generated notes.

on:
  push:
    tags: ['v*']

permissions:
  contents: write     # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (validation only — publish is local via scripts/build-push.sh)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes || true
