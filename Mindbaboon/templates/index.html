{% extends 'base.html' %}

{% block content %}
<div class="todos">
    {% for todo in todos %}
    <div class="todo-item {% if todo.completed %}completed{% endif %}">
        <h3>{{ todo.title }}</h3>
        <p>{{ todo.description }}</p>
        <p class="date">Created: {{ todo.created_at.strftime('%Y-%m-%d') }}</p>
        <a href="{{ url_for('edit', id=todo.id) }}" class="edit-btn">Edit</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
