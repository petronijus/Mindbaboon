<!DOCTYPE html>
<html xml:lang="en">
<head>
  <title>To-do List</title>
</head>
<body>
  <h1>To-do List</h1>
  <form action="{{ url_for('add') }}" method="post">
    <input type="text" name="task">
    <input type="submit" value="Add To-do">
  </form>
  <table>
    <thead>
      <tr>
        <th>Task</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for todo in todos %}
      <tr>
        <td>{{ todo[1] }}</td>
        <td>
          <a href="{{ url_for('edit', todo_id=todo[0]) }}">Edit</a>
          <a href="{{ url_for('delete', todo_id=todo[0]) }}">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
